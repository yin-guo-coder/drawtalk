<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Drawtalk</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <section class="intro-screen" id="intro-screen" aria-labelledby="intro-title">
      <div class="intro-content">
        <h1 class="intro-brand" id="intro-title">drawtalk</h1>
        <p class="intro-tagline">您的个性化语音绘图工具</p>
        <button class="intro-start-button" id="intro-start-button" type="button">开始使用</button>
      </div>
    </section>

    <main class="app-shell" id="app-shell" hidden>
      <section class="workbench" aria-labelledby="app-title">
        <header class="topbar">
          <div>
            <p class="eyebrow">Drawtalk</p>
            <h1 id="app-title">您的个性化语音绘图工具</h1>
          </div>
          <div class="status-chip" id="status-chip" data-state="idle">待命</div>
        </header>

        <section class="stage" aria-label="图片展示区">
          <div class="image-frame" id="image-frame">
            <div class="empty-image" aria-hidden="true">
              <div class="empty-sky"></div>
              <div class="empty-grid"></div>
            </div>
          </div>
        </section>

        <section class="voice-panel" aria-label="语音控制">
          <button class="mic-button" id="mic-button" type="button" aria-label="按住说话">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 14a4 4 0 0 0 4-4V6a4 4 0 1 0-8 0v4a4 4 0 0 0 4 4Z"></path>
              <path d="M19 10a7 7 0 0 1-14 0"></path>
              <path d="M12 17v4"></path>
              <path d="M8 21h8"></path>
            </svg>
          </button>
          <div class="voice-copy">
            <p class="voice-title" id="voice-title">按住说话</p>
            <p class="voice-status" id="voice-status">说出你想画的画面</p>
            <label class="provider-control" for="provider-select">
              <span>生图模型</span>
              <select id="provider-select" name="provider">
                <option value="horde">AI Horde</option>
                <option value="openai">GPT Image</option>
              </select>
            </label>
          </div>
        </section>
      </section>

      <aside class="versions-panel" aria-labelledby="versions-title">
        <div class="panel-header">
          <p class="eyebrow">Versions</p>
          <h2 id="versions-title">版本列表</h2>
        </div>
        <ol class="version-list" id="version-list">
          <li class="version-empty">暂无版本</li>
        </ol>
        <section class="speech-text-panel" aria-labelledby="speech-text-title">
          <div class="side-panel-header">
            <p class="eyebrow">Speech</p>
            <h2 id="speech-text-title">语音文本</h2>
          </div>
          <p id="transcript-preview" class="transcript-preview">暂无语音文本</p>
        </section>
        <section class="speaker-analysis-panel" aria-labelledby="speaker-analysis-title">
          <div class="side-panel-header">
            <p class="eyebrow">Voice</p>
            <h2 id="speaker-analysis-title">说话人分析</h2>
          </div>
          <div class="speech-insights" id="speech-insights">
            <span>性别 <strong id="speech-gender">--</strong></span>
            <span>年龄 <strong id="speech-age">--</strong></span>
            <span>情感 <strong id="speech-emotion">--</strong></span>
          </div>
        </section>
      </aside>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
</html>
